name: hg-workspace

services:
  backend:
    build:
      context: ./backend
      target: runtime
    environment:
      HG_ENV: ${HG_ENV:-development}
      HG_DATA_DIR: ${HG_DATA_DIR:-/data}
      HG_DATABASE: ${HG_DATABASE:-/data/hg.db}
      HG_BACKEND_PORT: ${HG_BACKEND_PORT:-8000}
      HG_TASK_WORKER_ENABLED: ${HG_TASK_WORKER_ENABLED:-true}
      HG_TASK_POLL_INTERVAL: ${HG_TASK_POLL_INTERVAL:-0.5}
      HG_SOURCE_TIMEOUT: ${HG_SOURCE_TIMEOUT:-20}
      HG_SOURCE_RETRIES: ${HG_SOURCE_RETRIES:-3}
      HG_SOURCE_DELAY: ${HG_SOURCE_DELAY:-0.15}
      HG_PLAYBACK_MAX_TTL: ${HG_PLAYBACK_MAX_TTL:-21600}
    ports:
      - "${HG_BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend/app:/app/app:ro
      - hg_data:/data
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend
      target: test
    command: ["python", "-m", "pytest", "-q"]

  android-builder:
    profiles: ["build"]
    build:
      context: .
      dockerfile: docker/android-builder.Dockerfile
    working_dir: /workspace/android
    volumes:
      - ./:/workspace
      - gradle_cache:/root/.gradle
    command: ["/workspace/scripts/build-android-in-container.sh"]

volumes:
  hg_data:
  gradle_cache:
